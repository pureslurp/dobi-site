<section>
  <h2 class="section-title">Contact Us</h2>
  <p class="section-subtitle">Have a question, need support, or just want to say hi? Fill out the form below and we'll get back to you as soon as we can.</p>

  <form class="contact-form" action="https://formsubmit.co/pureslurp@gmail.com" method="POST">
    <input type="hidden" name="_subject" value="New DoBi Contact Form Submission">
    <input type="hidden" name="_captcha" value="true">
    <input type="hidden" name="_next" value="https://pureslurp.github.io/dobi-site/thanks.html">
    <input type="text" name="_honey" style="display:none">

    <div class="form-group">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" placeholder="Your name" required>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required>
    </div>

    <div class="form-group">
      <label for="subject">Subject</label>
      <select id="subject" name="subject" required>
        <option value="" disabled selected>Select a topic</option>
        <option value="General Question">General Question</option>
        <option value="Pre-Sales Question">Pre-Sales Question</option>
        <option value="DoBi Nitro Inquiry">DoBi Nitro Inquiry</option>
        <option value="Order Support">Order Support</option>
        <option value="Technical Support">Technical Support</option>
        <option value="Refund Request">Refund Request</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" name="message" rows="6" placeholder="How can we help?" required></textarea>
    </div>

    <button type="submit" class="btn-submit">Send Message</button>
  </form>
</section>

  </div>

</footer>

</body>
</html>
